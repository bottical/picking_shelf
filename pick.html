<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピッキングシェルフ - ピッキングモード</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .sidebar {
            width: 300px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .main-list {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #f8fafc;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-done {
            background: #dcfce7;
            color: #166534;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <header>
        <div style="display:flex; align-items:center; gap:1rem;">
            <h2 style="margin:0;">🛒 ピッキングモード</h2>
            <div class="user-selector" id="userSelector">
                <button class="user-btn user-btn-1" data-user="user1">1</button>
                <button class="user-btn user-btn-2" data-user="user2">2</button>
                <button class="user-btn user-btn-3" data-user="user3">3</button>
                <button class="user-btn user-btn-4" data-user="user4">4</button>
            </div>
            <span id="sessionDisplay"
                style="font-size:0.8rem; background:#f1f5f9; padding:0.25rem 0.75rem; border-radius:99px; font-weight:600;"></span>
        </div>
        <div style="display:flex; gap:0.5rem;">
            <button class="btn btn-outline nav-link" data-page="index.html">🏠 HOME</button>
            <button class="btn btn-outline nav-link" data-page="wall.html">📱 Wall</button>
            <button class="btn btn-outline nav-link" data-page="inject.html">投入へ ➔</button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3 style="margin:0; font-size:1rem;">ピッキング開始</h3>
            <input type="text" id="listIdInput" placeholder="ピッキングNo.を入力..." autofocus>

            <button id="resetPickingBtn" class="btn btn-outline"
                style="width:100%; border-color: var(--danger); color: var(--danger); font-size: 0.8rem; margin-top: 0.5rem;">
                ✕ ピッキングをリセット
            </button>

            <div
                style="margin-top:auto; border-top:1px solid var(--border); padding-top:1rem; display:flex; flex-direction:column; gap:0.5rem;">
                <p style="font-size:0.75rem; color:var(--text-muted); font-weight:600; margin-bottom:0.5rem;">管理ツール</p>
                <button id="createSampleBtn" class="btn btn-outline" style="width:100%;">+ サンプルリスト作成</button>
                <button id="forcePickBtn" class="btn btn-outline"
                    style="width:100%; color:var(--danger);">強制PICKモード切替</button>
            </div>
        </aside>

        <main class="main-list">
            <h2 id="currentListTitle" style="margin-top:0; font-size:1.5rem; margin-bottom:1.5rem;">ピッキングNo.を入力してください
            </h2>
            <div class="card" style="padding:0; overflow:hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>JAN</th>
                            <th>数量</th>
                            <th>ロケーション</th>
                            <th>状態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="pickTable">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/state-manager.js"></script>
    <script src="js/pages/pick.js"></script>
</body>

</html>

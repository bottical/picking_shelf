<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ピッキングシェルフ - ウォール</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        html {
            height: 100%;
        }
        body {
            background: #0f172a;
            position: fixed;
            top: 0; left: 0; right: 0;
            width: 100%;
            height: 100vh; /* JSで上書きされます */
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
        }
        .wall-grid {
            display: grid;
            flex: 1;
            gap: 2px;
            padding: 2px;
            /* Will be dynamically styled for columns/rows in JS */
        }
        .mobile-screen {
            background: black;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #1e293b;
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
            margin-bottom: 80px; /* OSのメニューバー等に被らないための下部保護余白 */
        }
        .wall-grid .mobile-screen {
            margin-bottom: 0; /* マルチビュー(PC/タブレット)の際は下部余白をなくして敷き詰める */
        }
        .screen-header {
            background: #1e293b;
            padding: 0.25rem 0.5rem;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #94a3b8;
            font-weight: 800;
            flex-shrink: 0;
        }
        .live-badge {
            color: #22c55e;
        }
        .screen-body {
            flex: 1 1 auto;
            display: grid;
            gap: 2px;
            padding: 2px;
            min-height: 0;
            overflow: hidden;
        }
        
        /* Dynamic grids for split counts (Max 6) */
        .grid-split-1 { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr); }
        .grid-split-2-p { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); }
        .grid-split-2-l { grid-template-columns: 1fr 1fr; grid-template-rows: minmax(0, 1fr); }
        .grid-split-3 { grid-template-columns: 1fr 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); }
        .grid-split-4 { grid-template-columns: 1fr 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); }
        .grid-split-5-p { grid-template-columns: 1fr 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr); }
        .grid-split-5-l { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); }
        .grid-split-6-p { grid-template-columns: 1fr 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr); }
        .grid-split-6-l { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); }

        .block {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 2rem; /* Larger font size */
            font-weight: 900;
            color: #ffffff; /* Bright white text */
            border: 2px solid rgba(255, 255, 255, 0.4); /* Clear white border */
            border-radius: 4px;
            transition: 0.2s;
            position: relative;
            min-height: 0;
            min-width: 0;
            overflow: hidden;
        }
        .block.filled {
            background: var(--pick-color);
            color: white;
            border-color: transparent; /* Remove border for filled state */
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.2);
        }
        .block.picking {
            background: var(--pick-color);
            color: white;
            font-size: 3.5rem;
            border-color: transparent;
            box-shadow: 0 0 20px var(--pick-color);
            z-index: 10;
            opacity: 1;
        }
        .block.picking-done {
            background: black;
            color: var(--pick-color);
            border: 4px solid var(--pick-color); /* Overrides empty state border */
            font-size: 3.5rem;
            z-index: 5;
            opacity: 1;
        }
        .block.grayed-out {
            background: #111;
            color: #555;
            border-color: #333;
            opacity: 0.4;
            filter: grayscale(1);
        }
        .block.inject-ready {
            border: 2px dashed var(--pick-color);
            color: var(--pick-color);
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .config-overlay {
            position: absolute;
            bottom: 8px;
            right: 8px;
        }
        .btn-round {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }
        .btn-round.disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        .setup-needed {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .btn-setup {
            background: var(--primary);
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }
        .home-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            backdrop-filter: blur(8px);
            cursor: pointer;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            z-index: 100;
        }
        .selector-btn {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1.5rem 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .selector-btn:hover {
            background: #334155;
        }
    </style>
</head>
<body>
    <script>
        // スマホのアドレスバー分を含む見切れを完璧に防ぐため、純粋なブラウザの物理表示高さを随時同期するスクリプト
        const syncHeight = () => {
            document.body.style.height = window.innerHeight + 'px';
        };
        window.addEventListener('resize', syncHeight);
        window.addEventListener('orientationchange', syncHeight);
        syncHeight();
    </script>
    
    <!-- Top Nav / Header for Wall -->
    <div id="wallHeader" class="screen-header hidden" style="padding:1rem; display:flex; justify-content:space-between; align-items:center; background:#1e293b; flex-shrink: 0;">
        <button id="backBtn" class="btn btn-outline hidden" style="padding:0.25rem 0.75rem; font-size:0.8rem; color:white; border-color:#334155; background:transparent;">＜ 戻る</button>
        <span id="wallTitle" style="font-size:1.2rem; color:white; font-weight:bold; flex:1; text-align:center;">間口選択</span>
        <button id="openSettingsBtn" class="btn btn-outline" style="padding:0.25rem 0.75rem; font-size:0.8rem; color:white; border-color:#334155; background:transparent;">⚙️ 設定</button>
    </div>

    <!-- View Containers -->
    <div id="multiViewContainer" class="wall-grid hidden" style="flex: 1 1 auto; min-height: 0; overflow-y: auto;"></div>
    <div id="selectorViewContainer" class="hidden" style="flex: 1 1 auto; min-height: 0; padding: 1rem; display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); align-content: start; overflow-y: auto;"></div>
    <div id="singleViewContainer" class="hidden" style="flex: 1 1 auto; min-height: 0; padding: 2px; display: flex; flex-direction: column; overflow: hidden;"></div>

    <div id="bay10-container" class="hidden" style="padding: 4px; flex-shrink: 0;"></div>
    
    <a href="javascript:void(0)" id="homeBtn" class="home-btn nav-link" data-page="index.html">🏠 HOME</a>

    <!-- Setup Overlay -->
    <div id="setupOverlay" class="setup-needed hidden" style="z-index: 1000;">
        <div class="card" style="width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; background: var(--surface); color: var(--text);">
            <h3 style="margin-top:0;">📱 Wall 初期設定</h3>
            
            <div class="flex-column gap-1">
                <div>
                    <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">総間口数 (No.1〜)</label>
                    <input type="number" id="settingBays" min="1" max="100" value="9" style="margin-top:0.25rem;">
                </div>

                <div>
                    <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">表示モード</label>
                    <select id="settingViewMode" style="width:100%; padding:0.75rem 1rem; border-radius:0.5rem; border:1px solid var(--border); margin-top:0.25rem;">
                        <option value="single">個別表示 (スマホ向け)</option>
                        <option value="multi">一覧表示 (PC/タブレット向け)</option>
                    </select>
                </div>

                <div id="singleSettings">
                    <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">画面の向き (個別表示時)</label>
                    <select id="settingOrientation" style="width:100%; padding:0.75rem 1rem; border-radius:0.5rem; border:1px solid var(--border); margin-top:0.25rem;">
                        <option value="portrait">縦表示 (Portrait)</option>
                        <option value="landscape">横表示 (Landscape)</option>
                    </select>
                </div>

                <div id="multiSettings" class="hidden">
                    <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">一覧のレイアウト (行 × 列)</label>
                    <div style="display:flex; gap:0.5rem; align-items:center; margin-top:0.25rem;">
                        <input type="number" id="settingMultiRows" min="1" max="10" value="3" style="width:80px;"> 行 ×
                        <input type="number" id="settingMultiCols" min="1" max="10" value="3" style="width:80px;"> 列
                    </div>
                    <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted); margin-top: 1rem; display:block;">表示スタート間口 (No.)</label>
                    <input type="number" id="settingMultiStartId" min="1" max="100" value="1" style="margin-top:0.25rem;">
                </div>

                <button id="saveSettingsBtn" class="btn btn-primary" style="width:100%; margin-top:1rem;">保存して開始</button>
                <button id="closeSettingsBtn" class="btn btn-outline hidden" style="width:100%; margin-top:0.5rem;">キャンセル</button>
                <hr style="border:0; border-top:1px solid var(--border); width: 100%; margin: 1rem 0 0.5rem 0;">
                <a href="javascript:void(0)" class="btn btn-outline nav-link" data-page="index.html" style="width:100%; display:flex; align-items:center; justify-content:center; text-decoration:none; box-sizing:border-box;">🏠 HOME画面に戻る</a>
            </div>
        </div>
    </div>

    <!-- Bay Edit Overlay -->
    <div id="bayEditOverlay" class="setup-needed hidden" style="z-index: 1000;">
        <div class="card" style="width: 80%; max-width: 300px; background: var(--surface); color: var(--text);">
            <h3 id="editBayTitle" style="margin-top:0; text-align: center;">間口設定</h3>
            <div class="flex-column gap-1">
                <button id="bayAddSplitBtn" class="btn btn-primary">➕ 分割を増やす</button>
                <button id="bayRemoveSplitBtn" class="btn btn-outline">➖ 分割を減らす</button>
                <hr style="border:0; border-top:1px solid var(--border); width: 100%; margin: 0.5rem 0;">
                <button id="bayResetBtn" class="btn btn-danger">🔄 間口をリセット</button>
                <button id="bayEditCancelBtn" class="btn btn-outline" style="margin-top: 0.5rem;">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/state-manager.js"></script>
    <script src="js/pages/wall.js"></script>
</body>
</html>

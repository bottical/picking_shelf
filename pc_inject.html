<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CODEX - 投入モード</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Layout */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .main-view {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        /* Components */
        .btn {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn:hover {
            opacity: 0.9;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-family: inherit;
        }

        .card {
            background: white;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }

        /* Grid Map */
        .bay-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .bay-card {
            background: white;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.5rem;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
        }

        .bay-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .split-container {
            flex: 1;
            display: flex;
            gap: 4px;
        }

        .slot {
            flex: 1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: default;
            /* Disabled click on PC */
            transition: 0.2s;
            background: #f1f5f9;
            color: #94a3b8;
            border: 2px solid transparent;
        }

        .slot.filled {
            background: var(--success);
            color: white;
            border-color: transparent;
        }

        /* Waiting Mobile State */
        .waiting-mobile .slot {
            opacity: 0.5;
        }

        .scan-area {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            margin-top: 1rem;
            font-weight: bold;
        }

        .alert.error {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            display: block;
        }

        .alert.info {
            background: #eff6ff;
            color: var(--primary);
            border: 1px solid #bfdbfe;
            display: block;
        }

        .hidden {
            display: none !important;
        }

        /* Split Colors */
        .slot[data-sub="1"] {
            --slot-hue: 220;
        }

        .slot[data-sub="2"] {
            --slot-hue: 140;
        }

        .slot[data-sub="3"] {
            --slot-hue: 45;
        }

        .slot[data-sub="4"] {
            --slot-hue: 340;
        }

        .slot.filled {
            background: hsl(var(--slot-hue), 70%, 50%);
        }
    </style>
</head>

<body>
    <header>
        <div style="display:flex; align-items:center; gap:1rem;">
            <h2>📦 投入モード</h2>
            <span id="sessionDisplay"
                style="font-size:0.8rem; background:#eee; padding:2px 6px; border-radius:4px;"></span>
            <span id="connectionStatus" style="font-size:0.8rem; color:var(--warning);">● 接続中...</span>
        </div>
        <div style="display:flex; gap:0.5rem;">
            <a href="#" onclick="navToHome()" class="btn btn-outline" style="text-decoration:none;">🏠 HOME</a>
            <a href="#" onclick="navToWall()" class="btn btn-outline" style="text-decoration:none;">📱 Wall</a>
            <a href="#" onclick="navToPick()" class="btn btn-outline" style="text-decoration:none;">ピッキングモードへ ➔</a>
        </div>
    </header>

    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="card">
                <h3>1. データ読込</h3>
                <textarea id="csvInput" rows="3" placeholder="JANコードを貼り付け...">4901234567890
4901234567891
4901234567892
4901234567893</textarea>
                <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                    <button class="btn btn-primary" style="flex:1;" onclick="window.actions.loadCsv()">CSV読込
                        (RTDB)</button>
                </div>
            </div>

            <div class="card">
                <h3>2. 商品スキャン</h3>
                <input type="text" id="scanInput" placeholder="JANスキャン..." autofocus autocomplete="off">
                <div id="scanMsg" class="alert hidden"></div>
            </div>

            <div id="instructionPanel" class="card hidden"
                style="border: 2px solid var(--primary); background: #eff6ff;">
                <h3 style="color:var(--primary); margin-top:0;">📱 スマホ操作待ち</h3>
                <p id="instructionText" style="font-size:1.1rem; font-weight:bold;">
                    該当BAYのスマホで<br>投入先（空きスロット）を<br>タップしてください。
                </p>
                <div style="font-size:0.8rem; color:#666; margin-top:10px;">
                    ※PC側でのクリック操作は無効です
                </div>
            </div>
        </div>

        <!-- MAIN MAP -->
        <div class="main-view">
            <div class="bay-grid" id="bayGrid">
                <!-- Generated by JS -->
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // TODO: Replace with your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBlhRZK40uElE16XBPrppyixnE6Ei6zZUs",
            authDomain: "picking-shelf.firebaseapp.com",
            databaseURL: "https://picking-shelf-default-rtdb.firebaseio.com",
            projectId: "picking-shelf",
            storageBucket: "picking-shelf.firebasestorage.app",
            messagingSenderId: "665778536175",
            appId: "1:665778536175:web:48017831cf6256a5e5e51a"
        };

        // --- Init ---
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Get Session
        const params = new URLSearchParams(window.location.search);
        const SESSION_ID = params.get('session') || 'demo';
        document.getElementById('sessionDisplay').textContent = `SESSION: ${SESSION_ID}`;

        const stateRef = ref(db, `pickcart_demo/${SESSION_ID}/state`);

        // --- State Management ---
        let localState = {
            mode: 'INJECT',
            config: { bays: 9, maxSplit: 4 },
            slots: {},
            splits: {},
            injectList: [],
            pickLists: [],
            activePick: {},
            injectPending: null // { jan, requestedAt }
        };

        // Subscribe to RTDB
        onValue(stateRef, (snapshot) => {
            document.getElementById('connectionStatus').textContent = "● ONLINE";
            document.getElementById('connectionStatus').style.color = "var(--success)";

            const data = snapshot.val();
            if (data) {
                localState = { ...localState, ...data };
            } else {
                // Initialize if empty
                set(stateRef, localState);
            }
            render();
            updateUIState();
        }, (error) => {
            console.error(error);
            document.getElementById('connectionStatus').textContent = "● ERROR";
            document.getElementById('connectionStatus').style.color = "var(--danger)";
        });

        // --- Actions Exposed to Window ---
        window.navToHome = () => {
            window.location.href = `index.html?session=${SESSION_ID}`;
        };

        window.navToWall = () => {
            window.location.href = `mobile_wall.html?session=${SESSION_ID}`;
        };

        window.navToPick = () => {
            window.location.href = `pc_pick.html?session=${SESSION_ID}`;
        };

        window.actions = {
            loadCsv: () => {
                const lines = document.getElementById('csvInput').value.split('\n').filter(x => x.trim());
                update(stateRef, { injectList: lines, mode: 'INJECT' });
                alert(`${lines.length} 件のSKUを読み込みました`);
            },

            submitScan: (jan) => {
                const msgEl = document.getElementById('scanMsg');
                msgEl.className = 'alert hidden';

                // 1. Validate
                if (!localState.injectList.includes(jan)) {
                    msgEl.textContent = `❌ SKU ${jan} はCSVに見つかりません`;
                    msgEl.className = 'alert error';
                    document.getElementById('scanInput').value = '';
                    return;
                }
                const existing = Object.values(localState.slots || {}).find(s => s.sku === jan);
                if (existing) {
                    msgEl.textContent = `⚠️ SKU ${jan} は既に投入済みです`;
                    msgEl.className = 'alert error';
                    document.getElementById('scanInput').value = '';
                    return;
                }

                // 2. Set Pending (Lock PC, Activate Mobile)
                update(stateRef, {
                    injectPending: {
                        jan: jan,
                        status: "WAITING_SLOT",
                        requestedAt: Date.now()
                    }
                });
                // Input cleared by render/updateUIState
            }
        };

        // --- UI Logic ---
        const scanInput = document.getElementById('scanInput');
        scanInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.actions.submitScan(e.target.value.trim());
        });

        function updateUIState() {
            const pending = localState.injectPending;
            const instPanel = document.getElementById('instructionPanel');
            const scanArea = document.getElementById('scanInput');
            const scanMsg = document.getElementById('scanMsg');

            if (pending && pending.status === "WAITING_SLOT") {
                // LOCK MODE
                instPanel.classList.remove('hidden');
                scanArea.disabled = true;
                scanArea.value = pending.jan; // Show what we scanned
                scanArea.classList.add('disabled');

                scanMsg.textContent = `⏳ ${pending.jan} - 投入先を選択待機中...`;
                scanMsg.className = 'alert info';
            } else {
                // FREE MODE
                instPanel.classList.add('hidden');
                scanArea.disabled = false;
                if (scanArea.value && !document.activeElement.isSameNode(scanArea)) {
                    scanArea.value = '';
                }
                // If just finished
                if (scanMsg.className.includes('info')) {
                    scanMsg.className = 'alert hidden';
                    scanArea.value = '';
                    scanArea.focus();
                }
            }
        }

        function render() {
            const grid = document.getElementById('bayGrid');
            grid.innerHTML = '';

            for (let b = 1; b <= localState.config.bays; b++) {
                const bayEl = document.createElement('div');
                bayEl.className = 'bay-card';
                // If pending, maybe highlight bay? 

                // Header
                const title = document.createElement('div');
                title.className = 'bay-title';
                title.textContent = `BAY ${b}`;
                bayEl.appendChild(title);

                const container = document.createElement('div');
                container.className = 'split-container';

                const splitCount = (localState.splits && localState.splits[b]) || 1; // Default to 1 (but mobile enforces check)

                // Note: If split not confirmed (undefined), it essentially behaves like 1 but maybe greyed out?
                // User requirement: "If split not set... cannot use".
                // Implementation: If localState.splits[b] is undefined, we show "未設定".
                const isSplitDefined = (localState.splits && localState.splits[b] !== undefined);

                if (!isSplitDefined) {
                    // Show Unconfigured State
                    container.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center; color:#ccc; font-size:0.8rem; background:#f9f9f9;">スマホで設定</div>`;
                } else {
                    for (let s = 1; s <= splitCount; s++) {
                        const slotKey = `${b}-${s}`;
                        const slotData = localState.slots && localState.slots[slotKey];
                        const slot = document.createElement('div');

                        slot.className = 'slot';
                        slot.dataset.sub = s;

                        if (slotData) {
                            slot.classList.add('filled');
                            slot.textContent = slotData.sku.slice(-4);
                        } else {
                            slot.textContent = "空";
                        }
                        container.appendChild(slot);
                    }
                }
                bayEl.appendChild(container);
                grid.appendChild(bayEl);
            }
        }
    </script>
</body>


</html>

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CODEX - Inject Mode</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Layout */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .main-view {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        /* Components */
        .btn {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn:hover {
            opacity: 0.9;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-family: inherit;
        }

        .card {
            background: white;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }

        /* Grid Map */
        .bay-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .bay-card {
            background: white;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.5rem;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
        }

        .bay-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .split-container {
            flex: 1;
            display: flex;
            gap: 4px;
        }

        .slot {
            flex: 1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: not-allowed;
            transition: 0.2s;
            background: #f1f5f9;
            color: #94a3b8;
            border: 2px solid transparent;
        }

        .slot.active {
            cursor: pointer;
            background: #e0f2fe;
            color: var(--primary);
            border-color: var(--primary);
        }

        .slot.filled {
            background: var(--success);
            color: white;
            border-color: transparent;
            cursor: default;
        }

        .scan-area {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            margin-top: 1rem;
            font-weight: bold;
        }

        .alert.error {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            display: block;
        }

        .alert.info {
            background: #eff6ff;
            color: var(--primary);
            border: 1px solid #bfdbfe;
            display: block;
        }

        .hidden {
            display: none !important;
        }

        /* Split Colors */
        .slot[data-sub="1"] {
            --slot-hue: 220;
        }

        /* Blue */
        .slot[data-sub="2"] {
            --slot-hue: 140;
        }

        /* Green */
        .slot[data-sub="3"] {
            --slot-hue: 45;
        }

        /* Yellow */
        .slot[data-sub="4"] {
            --slot-hue: 340;
        }

        /* Pink */

        .slot.filled {
            background: hsl(var(--slot-hue), 70%, 50%);
        }
    </style>
</head>

<body>
    <header>
        <div style="display:flex; align-items:center; gap:1rem;">
            <h2>📦 Inject Mode</h2>
            <span id="connectionStatus" style="font-size:0.8rem; color:var(--success);">● Live</span>
        </div>
        <div>
            <a href="pc_pick.html" class="btn btn-outline" style="text-decoration:none;">Switch to Pick ➔</a>
        </div>
    </header>

    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="card">
                <h3>1. Load Data</h3>
                <textarea id="csvInput" rows="3" placeholder="Paste JAN codes...">4901234567890
4901234567891
4901234567892
4901234567893</textarea>
                <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                    <button class="btn btn-primary" style="flex:1;" onclick="loadCsv()">Load CSV</button>
                    <button class="btn btn-outline" onclick="resetAll()">Reset</button>
                </div>
            </div>

            <div class="card">
                <h3>2. Scan Item</h3>
                <input type="text" id="scanInput" placeholder="Scan JAN..." autofocus autocomplete="off">
                <div id="scanMsg" class="alert hidden"></div>
            </div>

            <div id="instructionPanel" class="card hidden">
                <h3 style="color:var(--primary);">👉 Action Required</h3>
                <p id="instructionText">Select a slot on the right.</p>
            </div>
        </div>

        <!-- MAIN MAP -->
        <div class="main-view">
            <div class="bay-grid" id="bayGrid">
                <!-- Generated by JS -->
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // SHARED STATE LOGIC (Embedded for Standalone)
        // ==========================================
        const STORE_KEY = 'PICKCART_STATE_V1';
        const CHANNEL_NAME = 'pickcart_demo';

        const DEFAULT_STATE = {
            mode: 'INJECT',
            config: { bays: 9, maxSplit: 4 },
            slots: {}, // Key: "bayId-subId" -> { sku, filled: true }
            splits: {}, // Key: "bayId" -> count (1..4)
            injectList: [], // Array of JANs
            pickLists: [],
            activePick: {}
        };

        class StateManager {
            constructor() {
                this.bc = new BroadcastChannel(CHANNEL_NAME);
                this.bc.onmessage = (ev) => {
                    if (ev.data.type === 'UPDATE') this.load();
                    if (ev.data.type === 'RESET') this.resetLocal();
                };
                this.state = this.loadLocal() || DEFAULT_STATE;
            }

            loadLocal() {
                try {
                    return JSON.parse(localStorage.getItem(STORE_KEY));
                } catch (e) { return null; }
            }

            load() {
                this.state = this.loadLocal() || DEFAULT_STATE;
                render();
            }

            save(newState) {
                this.state = newState;
                localStorage.setItem(STORE_KEY, JSON.stringify(this.state));
                this.bc.postMessage({ type: 'UPDATE' });
                render();
            }

            resetLocal() {
                localStorage.removeItem(STORE_KEY);
                this.state = DEFAULT_STATE; // Revert to memory default
                location.reload();
            } // Don't broadcast inside resetLocal to avoid loops if called from broadcast
        }

        const app = new StateManager();

        // ==========================================
        // PAGE SPECIFIC LOGIC
        // ==========================================
        let currentScannedJan = null;

        document.addEventListener('DOMContentLoaded', () => {
            render();
            document.getElementById('scanInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleScan(e.target.value.trim());
            });
        });

        function resetAll() {
            if (confirm("Reset entire system?")) {
                app.save(JSON.parse(JSON.stringify(DEFAULT_STATE))); // Deep copy default
                location.reload();
            }
        }

        function loadCsv() {
            const lines = document.getElementById('csvInput').value.split('\n').filter(x => x.trim());
            const newState = { ...app.state, injectList: lines };
            app.save(newState);
            alert(`Loaded ${lines.length} SKUs`);
        }

        function handleScan(jan) {
            const state = app.state;
            const msgEl = document.getElementById('scanMsg');
            const instEl = document.getElementById('instructionPanel');
            const instText = document.getElementById('instructionText');

            msgEl.className = 'alert hidden';
            instEl.classList.add('hidden');
            currentScannedJan = null;

            if (!jan) return;

            // 1. Check if in Inject List
            if (!state.injectList.includes(jan)) {
                msgEl.textContent = `❌ SKU ${jan} not found in CSV`;
                msgEl.className = 'alert error';
                document.getElementById('scanInput').value = '';
                return;
            }

            // 2. Check Duplicates
            const existing = Object.values(state.slots).find(s => s.sku === jan);
            if (existing) {
                msgEl.textContent = `⚠️ SKU ${jan} already injected`;
                msgEl.className = 'alert error'; // Using error style for visibility
                document.getElementById('scanInput').value = '';
                return;
            }

            // 3. Valid -> Enter Select Mode
            currentScannedJan = jan;
            msgEl.textContent = `✅ Scan OK: ${jan}`;
            msgEl.className = 'alert info';
            instEl.classList.remove('hidden');
            instText.textContent = "Select an empty slot on the right to assign.";

            // Re-render to show highlighting
            render();
        }

        function handleSlotClick(bayId, subId) {
            if (!currentScannedJan) return;

            const slotKey = `${bayId}-${subId}`;
            const state = app.state;

            // Prevent overwrite
            if (state.slots[slotKey]) {
                alert("Slot already occupied!");
                return;
            }

            // Update State
            const newSlots = { ...state.slots, [slotKey]: { sku: currentScannedJan } };
            app.save({ ...state, slots: newSlots });

            // Reset Input
            currentScannedJan = null;
            document.getElementById('scanInput').value = '';
            document.getElementById('scanMsg').className = 'alert hidden';
            document.getElementById('instructionPanel').classList.add('hidden');
            document.getElementById('scanInput').focus();
        }

        function render() {
            const state = app.state;
            const grid = document.getElementById('bayGrid');
            grid.innerHTML = '';

            for (let b = 1; b <= state.config.bays; b++) {
                const bayEl = document.createElement('div');
                bayEl.className = 'bay-card';

                // Header
                const title = document.createElement('div');
                title.className = 'bay-title';
                title.textContent = `BAY ${b}`;
                bayEl.appendChild(title);

                // Slots Container
                const container = document.createElement('div');
                container.className = 'split-container';

                // Get split count (default 1 if not set)
                const splitCount = state.splits[b] || 1;

                for (let s = 1; s <= splitCount; s++) {
                    const slotKey = `${b}-${s}`;
                    const slotData = state.slots[slotKey];
                    const slot = document.createElement('div');

                    slot.className = 'slot';
                    slot.dataset.sub = s;

                    if (slotData) {
                        slot.classList.add('filled');
                        // Show last 4 digits
                        slot.textContent = slotData.sku.slice(-4);
                    } else if (currentScannedJan) {
                        slot.classList.add('active');
                        slot.textContent = "SELECT";
                        slot.onclick = () => handleSlotClick(b, s);
                    } else {
                        slot.textContent = "EMPTY";
                    }

                    container.appendChild(slot);
                }

                // If in selection mode but split is 1 (and empty), show hint? 
                // Requirement: "If split not set, PC says 'set on mobile'".
                // Implementation: If split is 1, user can technically select it. 
                // The requirement says "Initial inject... if split not set... PC says set on mobile".
                // We'll trust the Mobile Wall default behavior (starts at 1). 
                // We won't block selection on count=1, but we might show a hint if we wanted.
                // For now, simple is best.

                bayEl.appendChild(container);
                grid.appendChild(bayEl);
            }
        }
    </script>
</body>

</html>

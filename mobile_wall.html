<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>CODEX - モバイルウォール</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {

            font-family: 'Inter', system-ui;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        .wall-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            height: 100vh;
            gap: 2px;
            padding: 2px;
            border: 4px solid #334155;
            box-sizing: border-box;
        }

        .mobile-screen {
            background: black;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen-header {
            background: #334155;
            color: #94a3b8;
            font-size: 0.75rem;
            padding: 0.25rem;
            text-align: center;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        .live-badge {
            color: #22c55e;
            font-size: 0.6rem;
            opacity: 0;
        }

        .live-badge.on {
            opacity: 1;
        }

        .screen-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0.25rem;
            gap: 2px;
        }

        /* Split Blocks */
        .block {
            flex: 1;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #444;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.2s;
            cursor: default;
        }

        /* Filled State */
        .block.filled {
            color: #888;
            border: 1px solid #444;
        }

        /* Pick Active State */
        .block.picking {
            background: var(--pick-color);
            color: white;
            font-size: 2rem;
            box-shadow: 0 0 15px var(--pick-color);
            z-index: 10;
        }

        /* Selectable for Inject (Pending Mode) */
        .block.inject-ready {
            cursor: pointer;
            background: #1e293b;
            color: #ccc;
            border: 2px dashed #94a3b8;
            animation: pulse 1.5s infinite;
        }

        .block.inject-ready:hover {
            background: #334155;
            border-color: white;
            color: white;
        }

        @keyframes pulse {
            0% {
                border-color: #64748b;
            }

            50% {
                border-color: #f8fafc;
            }

            100% {
                border-color: #64748b;
            }
        }

        /* Split Colors Definitions for Pick Mode */
        .block[data-sub="1"] {
            --pick-color: #3b82f6;
        }

        .block[data-sub="2"] {
            --pick-color: #22c55e;
        }

        .block[data-sub="3"] {
            --pick-color: #eab308;
        }

        .block[data-sub="4"] {
            --pick-color: #ec4899;
        }

        /* Config UI overlay */
        .config-overlay {
            position: absolute;
            bottom: 5px;
            right: 5px;
            display: flex;
            gap: 5px;
        }

        .btn-round {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-round:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .btn-round.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-confirm {
            font-size: 0.8rem;
            width: auto;
            padding: 0 8px;
            border-radius: 15px;
        }

        /* Initial Setup Overlay */
        .setup-needed {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            text-align: center;
            z-index: 20;
        }

        .home-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            z-index: 100;
            text-decoration: none;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <div class="wall-grid" id="wall">
        <!-- 9 Screens generated here -->
    </div>

    <a href="#" onclick="navToHome(); return false;" class="home-btn">🏠 HOME</a>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // TODO: Replace with your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBlhRZK40uElE16XBPrppyixnE6Ei6zZUs",
            authDomain: "picking-shelf.firebaseapp.com",
            databaseURL: "https://picking-shelf-default-rtdb.firebaseio.com",
            projectId: "picking-shelf",
            storageBucket: "picking-shelf.firebasestorage.app",
            messagingSenderId: "665778536175",
            appId: "1:665778536175:web:48017831cf6256a5e5e51a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Get Session
        const params = new URLSearchParams(window.location.search);
        const SESSION_ID = params.get('session') || 'demo';

        const stateRef = ref(db, `pickcart_demo/${SESSION_ID}/state`);

        let localState = {
            mode: 'INJECT',
            config: { bays: 9, maxSplit: 4 },
            slots: {},
            splits: {},
            activePick: {},
            injectPending: null
        };

        // --- Subscribe ---
        onValue(stateRef, (snapshot) => {
            const val = snapshot.val();
            if (val) localState = { ...localState, ...val };

            console.log("State Updated:", val);
            render();

            // Show Live Status
            document.querySelectorAll('.live-badge').forEach(el => {
                el.classList.add('on');
                el.style.color = '#22c55e'; // Green
                el.textContent = '● LIVE';
            });
        }, (error) => {
            console.error("Firebase Error", error);
            document.querySelectorAll('.live-badge').forEach(el => {
                el.classList.add('on');
                el.style.color = '#ef4444'; // Red
                el.textContent = '● OFFLINE';
            });
        });

        window.navToHome = () => {
            window.location.href = `index.html?session=${SESSION_ID}`;
        };

        // --- Actions ---
        window.actions = {
            // 1. Split Config (Add or Confirm)
            incrementSplit: (bayId) => {
                const current = (localState.splits && localState.splits[bayId]) || 1;
                if (current >= 4) return;

                // Existing item check
                const hasItems = Object.keys(localState.slots || {}).some(k => k.startsWith(`${bayId}-`));
                if (hasItems) {
                    alert("使用中の間口は分割できません！");
                    return;
                }

                // Using update for simple writes
                const updates = {};
                updates[`splits/${bayId}`] = current + 1;
                update(stateRef, updates);
            },

            confirmSplit: (bayId) => {
                // Confirm 1
                const updates = {};
                updates[`splits/${bayId}`] = 1;
                update(stateRef, updates);
            },

            // 2. Inject Slot Selection
            selectSlot: (bayId, subId) => {
                if (!localState.injectPending || localState.injectPending.status !== "WAITING_SLOT") return;

                const slotKey = `${bayId}-${subId}`;
                const pendingJan = localState.injectPending.jan;

                // Transaction for safety
                runTransaction(stateRef, (currentData) => {
                    if (currentData === null) return currentData;

                    // Re-validate inside transaction
                    if (!currentData.injectPending || currentData.injectPending.jan !== pendingJan) {
                        return; // Pending changed/gone
                    }

                    if (currentData.slots && currentData.slots[slotKey]) {
                        // Occupied!
                        return; // Abort
                    }

                    // Write
                    if (!currentData.slots) currentData.slots = {};
                    currentData.slots[slotKey] = { sku: pendingJan };

                    // Clear Pending
                    currentData.injectPending = null;

                    return currentData;
                }).then((result) => {
                    if (result.committed) {
                        // Success Feedback? (Render handles it)
                    } else {
                        alert("他で更新されたか、条件を満たしていません");
                    }
                }).catch(err => console.error(err));
            }
        };


        function render() {
            const grid = document.getElementById('wall');
            grid.innerHTML = '';

            for (let b = 1; b <= 9; b++) {
                const screen = document.createElement('div');
                screen.className = 'mobile-screen';

                // Header
                screen.innerHTML = `
                    <div class="screen-header">
                        <span>BAY ${b}</span>
                        <span class="live-badge">● LIVE</span>
                    </div>`;

                // Logic for Split State
                // If splits[b] undefined -> Need Setup
                const isConfigured = (localState.splits && localState.splits[b] !== undefined);
                const splitCount = isConfigured ? localState.splits[b] : 1;

                // Body
                const body = document.createElement('div');
                body.className = 'screen-body';

                for (let s = 1; s <= splitCount; s++) {
                    const block = document.createElement('div');
                    block.className = 'block';
                    block.dataset.sub = s;

                    const slotKey = `${b}-${s}`;
                    const slotData = localState.slots && localState.slots[slotKey];
                    const pickData = localState.activePick && localState.activePick[slotKey];

                    // Render Logic
                    if (localState.mode === 'PICK' && pickData) {
                        // Pick Mode Light
                        block.classList.add('picking');
                        block.textContent = pickData.qty;
                    } else if (slotData) {
                        // Filled
                        block.classList.add('filled');
                        block.textContent = slotData.sku.slice(-4);
                    } else {
                        // Empty
                        // Check if Inject Pending -> ready to click
                        if (localState.mode === 'INJECT' && localState.injectPending && isConfigured) {
                            block.classList.add('inject-ready');
                            block.textContent = "TAP";
                            block.onclick = () => window.actions.selectSlot(b, s);
                        } else {
                            block.textContent = s;
                        }
                    }
                    body.appendChild(block);
                }
                screen.appendChild(body);

                // Live Config Overlay (Only in Inject Msg)
                if (localState.mode === 'INJECT') {
                    // If not configured, show "Initial Setup" overlay
                    if (!isConfigured) {
                        const setup = document.createElement('div');
                        setup.className = 'setup-needed';

                        // If pending exists, warn heavily
                        if (localState.injectPending) {
                            setup.innerHTML = `<div style="margin-bottom:5px; color:#fca5a5; font-weight:bold;">投入待機中<br>未設定</div>`;
                        } else {
                            setup.innerHTML = `<div style="margin-bottom:5px;">未設定</div>`;
                        }

                        const btnOk = document.createElement('div');
                        btnOk.className = 'btn-round btn-confirm';
                        btnOk.textContent = '初期化(1分割)';
                        btnOk.onclick = () => window.actions.confirmSplit(b);

                        setup.appendChild(btnOk);
                        screen.appendChild(setup);
                    } else {
                        // Normal Config (+ button)
                        const overlay = document.createElement('div');
                        overlay.className = 'config-overlay';

                        // Check if occupied
                        const hasItems = Object.keys(localState.slots || {}).some(k => k.startsWith(`${b}-`));

                        const btn = document.createElement('div');
                        btn.className = 'btn-round';
                        if (splitCount >= 4 || hasItems) btn.classList.add('disabled');
                        btn.textContent = '+';
                        btn.onclick = () => window.actions.incrementSplit(b);

                        overlay.appendChild(btn);
                        screen.appendChild(overlay);
                    }
                }

                grid.appendChild(screen);
            }
        }
    </script>
</body>


</html>
